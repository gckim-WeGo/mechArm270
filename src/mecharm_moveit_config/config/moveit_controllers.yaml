# MoveIt 2 Humble: moveit_simple_controller_manager 네임스페이스 하위에 모두 작성
moveit_simple_controller_manager:
  controller_names:
    - arm_controller
    - gripper_controller

  arm_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - joint1_to_base
      - joint2_to_joint1
      - joint3_to_joint2
      - joint4_to_joint3
      - joint5_to_joint4
      - joint6_to_joint5

  gripper_controller:
    type: GripperCommand
    action_ns: gripper_action
    default: true
    joints:
      - gripper_controller
